<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasmin Counter</title>
    <link rel="stylesheet" href="jasmien. css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <h1>Jasmin Counter</h1>
            <p>Enter password to access</p>
            <div class="login-form">
                <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
                <button onclick="checkPassword()">Login</button>
                <p id="errorMessage" class="error-message"></p>
            </div>
        </div>
    </div>

    <!-- Counter Page -->
    <div id="counterPage" class="page">
        <div class="counter-container">
            <h1>Jasmin Counter</h1>

            <div class="counter-display">
                <h2 id="counterValue">0</h2>
            </div>

            <div class="counter-controls">
                <button onclick="decrementCounter()" class="btn btn-decrement">-</button>
                <button onclick="incrementCounter()" class="btn btn-increment">+</button>
            </div>

            <div id="rateLimitMessage" class="rate-limit-message"></div>

            <div class="history-controls">
                <button onclick="navigateHistory(-1)" class="btn-history">← Previous</button>
                <span id="historyPosition">1/1</span>
                <button onclick="navigateHistory(1)" class="btn-history">Next →</button>
            </div>

            <div class="log-section">
                <h3>Counter Log</h3>
                <div id="logContainer" class="log-container">
                    <!-- Logs will be displayed here -->
                </div>
            </div>

            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </div>

    <script src="jasmien.js"></script>
</body>
</html>
